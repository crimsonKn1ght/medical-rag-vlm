vision_encoder:
  model_name: openai/clip-vit-large-patch14
  select_layer: -2
  select_feature: patch
language_model:
  model_name: Qwen/Qwen2.5-1.5B-Instruct
  torch_dtype: bfloat16
connector:
  vision_hidden_size: 1024
  llm_hidden_size: 1536
data:
  train_data_path: datasets/llava_recap_558k/train.json
  image_dir: datasets/llava_recap_558k/images
  max_length: 512
training:
  output_dir: ./checkpoints/sample-stage1
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 0.002
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  bf16: true
  dataloader_num_workers: 0
  logging_steps: 1
  save_steps: 1
  seed: 42
